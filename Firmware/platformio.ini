; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = esp32_s3_cam
boards_dir = boards

[env]
platform = https://github.com/pioarduino/platform-espressif32#55.03.34
framework = arduino
build_flags =
    -D CONFIG_ARDUHAL_ESP_LOG=1
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
    -Werror=return-type
board_build.filesystem = littlefs
monitor_speed=115200
monitor_filters = default, esp32_exception_decoder
;lib_compat_mode = strict
;lib_ldf_mode = chain
lib_deps =
    https://github.com/FastLED/FastLED.git#cec6034926407cdc89e0c570aba3ad2bf8f0b907
    ;#a8b45adae2becc22beb287449c89eb1ad9a3df04
    bbx10/DNSServer@^1.1.0
    bblanchon/ArduinoJson@^7.4.3
    https://github.com/johnny49r/ESP_DSP_FFT.git
extra_scripts =
    pre:./scripts/make_content.py   ;Make HTML static content
    pre:./scripts/make_version.py   ;Make Git version
    post:./scripts/make_fw_file.py  ;Output firmware file

[env:esp32_s3_cam]
board = ax_esp32_s3_cam_N16R8
build_flags =
    ${env.build_flags}
    -D S3_CAM=1
lib_deps =
    ${env.lib_deps}
monitor_rts = 0
monitor_dtr = 0

[env:lilygo-t7-s3]
board = lilygo-t7-s3
build_flags =
    ${env.build_flags}
    -D T7_S3=1
    ; -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}